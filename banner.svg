<svg width="100%" viewBox="0 0 620 380" xmlns="http://www.w3.org/2000/svg" style="background:#020b12;border-radius:12px;display:block;">
  <defs>
    <style>
      @keyframes radar-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      @keyframes radar-fade { 0%,100%{opacity:0} 10%{opacity:0.7} 40%{opacity:0.3} 90%{opacity:0} }
      @keyframes pulse-ring { 0%{r:0;opacity:0.7} 100%{r:120;opacity:0} }
      @keyframes pulse-ring2 { 0%{r:0;opacity:0.5} 100%{r:90;opacity:0} }
      @keyframes node-blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
      @keyframes float-up { 0%{transform:translateY(0);opacity:0.7} 100%{transform:translateY(-320px);opacity:0} }
      @keyframes scan-line { 0%{transform:translateY(-5px);opacity:0} 10%{opacity:1} 90%{opacity:0.8} 100%{transform:translateY(340px);opacity:0} }
      @keyframes hex-pulse { 0%,100%{opacity:0.06} 50%{opacity:0.18} }
      @keyframes shield-glow { 0%,100%{filter:drop-shadow(0 0 8px #00E676) drop-shadow(0 0 16px #00E67660)} 50%{filter:drop-shadow(0 0 18px #00E676) drop-shadow(0 0 40px #00E676aa)} }
      @keyframes threat-appear { 0%{opacity:0;r:0} 30%{opacity:1;r:6} 70%{opacity:1;r:6} 100%{opacity:0;r:0} }
      @keyframes grid-drift { 0%{transform:translateY(0)} 100%{transform:translateY(40px)} }
      @keyframes data-stream { 0%{stroke-dashoffset:300} 100%{stroke-dashoffset:-300} }
      @keyframes title-glow { 0%,100%{opacity:0.9} 50%{opacity:1} }
      @keyframes corner-flash { 0%,90%,100%{opacity:0.4} 45%{opacity:1} }
      @keyframes ring-rotate { from{transform-origin:310px 210px;transform:rotate(0deg)} to{transform-origin:310px 210px;transform:rotate(360deg)} }
      @keyframes counter { 0%{opacity:0} 5%{opacity:1} 95%{opacity:1} 100%{opacity:0} }

      .radar-sweep { transform-origin: 310px 210px; animation: radar-spin 3s linear infinite; }
      .pulse { transform-origin: 310px 210px; animation: pulse-ring 2.5s ease-out infinite; }
      .pulse2 { transform-origin: 310px 210px; animation: pulse-ring2 2.5s ease-out infinite 1.25s; }
      .scan { animation: scan-line 4s ease-in-out infinite 1s; transform-origin: 0 0; }
      .shield-g { animation: shield-glow 3s ease-in-out infinite; }
      .hex-bg { animation: hex-pulse 4s ease-in-out infinite; }
      .hex-bg2 { animation: hex-pulse 4s ease-in-out infinite 2s; }
      .grid-move { animation: grid-drift 8s linear infinite; }
    </style>
    <!-- Radar sweep gradient -->
    <radialGradient id="rg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00E676" stop-opacity="0.0"/>
      <stop offset="60%" stop-color="#00E676" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#00E676" stop-opacity="0.0"/>
    </radialGradient>
    <radialGradient id="radarGrad" cx="0%" cy="50%" r="100%">
      <stop offset="0%" stop-color="#00E676" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#00E676" stop-opacity="0"/>
    </radialGradient>
    <!-- Vignette -->
    <radialGradient id="vig" cx="50%" cy="50%" r="70%">
      <stop offset="50%" stop-color="#020b12" stop-opacity="0"/>
      <stop offset="100%" stop-color="#020b12" stop-opacity="0.85"/>
    </radialGradient>
    <!-- Shield gradient -->
    <linearGradient id="shieldFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00E676" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#00E676" stop-opacity="0.05"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Clip for radar -->
    <clipPath id="rc"><circle cx="310" cy="210" r="120"/></clipPath>
    <!-- Clip for scan line -->
    <clipPath id="sc"><rect x="0" y="0" width="620" height="380"/></clipPath>
  </defs>

  <!-- ── PERSPECTIVE GRID (bottom half) ── -->
  <g class="grid-move" opacity="0.18">
    <!-- Horizontal lines (perspective) -->
    <line x1="0" y1="220" x2="620" y2="220" stroke="#00E676" stroke-width="0.4"/>
    <line x1="50" y1="240" x2="570" y2="240" stroke="#00E676" stroke-width="0.4"/>
    <line x1="100" y1="265" x2="520" y2="265" stroke="#00E676" stroke-width="0.4"/>
    <line x1="130" y1="295" x2="490" y2="295" stroke="#00E676" stroke-width="0.4"/>
    <line x1="150" y1="330" x2="470" y2="330" stroke="#00E676" stroke-width="0.3"/>
    <line x1="160" y1="370" x2="460" y2="370" stroke="#00E676" stroke-width="0.2"/>
    <!-- Vanishing vertical lines -->
    <line x1="310" y1="180" x2="0"   y2="380" stroke="#00E676" stroke-width="0.4"/>
    <line x1="310" y1="180" x2="620" y2="380" stroke="#00E676" stroke-width="0.4"/>
    <line x1="310" y1="180" x2="80"  y2="380" stroke="#00E676" stroke-width="0.3"/>
    <line x1="310" y1="180" x2="540" y2="380" stroke="#00E676" stroke-width="0.3"/>
    <line x1="310" y1="180" x2="155" y2="380" stroke="#00E676" stroke-width="0.25"/>
    <line x1="310" y1="180" x2="465" y2="380" stroke="#00E676" stroke-width="0.25"/>
    <line x1="310" y1="180" x2="220" y2="380" stroke="#00E676" stroke-width="0.2"/>
    <line x1="310" y1="180" x2="400" y2="380" stroke="#00E676" stroke-width="0.2"/>
    <line x1="310" y1="180" x2="255" y2="380" stroke="#00E676" stroke-width="0.15"/>
    <line x1="310" y1="180" x2="365" y2="380" stroke="#00E676" stroke-width="0.15"/>
    <line x1="310" y1="180" x2="280" y2="380" stroke="#00E676" stroke-width="0.12"/>
    <line x1="310" y1="180" x2="340" y2="380" stroke="#00E676" stroke-width="0.12"/>
  </g>

  <!-- ── HEX GRID OVERLAY ── -->
  <g class="hex-bg">
    <!-- Row 1 -->
    <polygon points="40,30 60,18 80,30 80,54 60,66 40,54" fill="none" stroke="#00E676" stroke-width="0.5"/>
    <polygon points="100,30 120,18 140,30 140,54 120,66 100,54" fill="none" stroke="#00E676" stroke-width="0.5"/>
    <polygon points="160,30 180,18 200,30 200,54 180,66 160,54" fill="none" stroke="#00E676" stroke-width="0.5"/>
    <polygon points="460,30 480,18 500,30 500,54 480,66 460,54" fill="none" stroke="#00E676" stroke-width="0.5"/>
    <polygon points="520,30 540,18 560,30 560,54 540,66 520,54" fill="none" stroke="#00E676" stroke-width="0.5"/>
    <polygon points="580,30 600,18 620,30 620,54 600,66 580,54" fill="none" stroke="#00E676" stroke-width="0.5"/>
    <!-- Row 2 offset -->
    <polygon points="70,66 90,54 110,66 110,90 90,102 70,90" fill="none" stroke="#00E676" stroke-width="0.4"/>
    <polygon points="490,66 510,54 530,66 530,90 510,102 490,90" fill="none" stroke="#00E676" stroke-width="0.4"/>
    <!-- Row 3 -->
    <polygon points="20,102 40,90 60,102 60,126 40,138 20,126" fill="none" stroke="#00E676" stroke-width="0.4"/>
    <polygon points="560,102 580,90 600,102 600,126 580,138 560,126" fill="none" stroke="#00E676" stroke-width="0.4"/>
  </g>
  <g class="hex-bg2">
    <polygon points="0,150 20,138 40,150 40,174 20,186 0,174" fill="none" stroke="#00E676" stroke-width="0.4"/>
    <polygon points="580,150 600,138 620,150 620,174 600,186 580,174" fill="none" stroke="#00E676" stroke-width="0.4"/>
    <polygon points="30,186 50,174 70,186 70,210 50,222 30,210" fill="none" stroke="#00E676" stroke-width="0.4"/>
    <polygon points="550,186 570,174 590,186 590,210 570,222 550,210" fill="none" stroke="#00E676" stroke-width="0.4"/>
  </g>

  <!-- ── CORNER BRACKETS (HUD aesthetic) ── -->
  <g stroke="#00E676" stroke-width="1.5" fill="none" opacity="0.7">
    <path d="M14,14 L14,38 M14,14 L38,14" style="animation:corner-flash 3s ease-in-out infinite"/>
    <path d="M606,14 L606,38 M606,14 L582,14" style="animation:corner-flash 3s ease-in-out infinite 0.75s"/>
    <path d="M14,366 L14,342 M14,366 L38,366" style="animation:corner-flash 3s ease-in-out infinite 1.5s"/>
    <path d="M606,366 L606,342 M606,366 L582,366" style="animation:corner-flash 3s ease-in-out infinite 2.25s"/>
  </g>

  <!-- ── SCAN LINE (full width) ── -->
  <g clip-path="url(#sc)">
    <rect class="scan" x="0" y="0" width="620" height="2" fill="url(#scanGrad)" opacity="0.6"/>
    <defs>
      <linearGradient id="scanGrad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#00E676" stop-opacity="0"/>
        <stop offset="30%" stop-color="#00E676" stop-opacity="0.8"/>
        <stop offset="70%" stop-color="#00E676" stop-opacity="0.8"/>
        <stop offset="100%" stop-color="#00E676" stop-opacity="0"/>
      </linearGradient>
    </defs>
  </g>

  <!-- ── RADAR CIRCLE ── -->
  <!-- Concentric rings -->
  <circle cx="310" cy="210" r="120" fill="none" stroke="#00E676" stroke-width="0.5" opacity="0.25"/>
  <circle cx="310" cy="210" r="90"  fill="none" stroke="#00E676" stroke-width="0.4" opacity="0.2"/>
  <circle cx="310" cy="210" r="60"  fill="none" stroke="#00E676" stroke-width="0.4" opacity="0.2"/>
  <circle cx="310" cy="210" r="30"  fill="none" stroke="#00E676" stroke-width="0.5" opacity="0.3"/>
  <!-- Cross hairs -->
  <line x1="190" y1="210" x2="430" y2="210" stroke="#00E676" stroke-width="0.4" opacity="0.2"/>
  <line x1="310" y1="90"  x2="310" y2="330" stroke="#00E676" stroke-width="0.4" opacity="0.2"/>

  <!-- Pulse rings -->
  <circle class="pulse"  cx="310" cy="210" r="0" fill="none" stroke="#00E676" stroke-width="1"/>
  <circle class="pulse2" cx="310" cy="210" r="0" fill="none" stroke="#00E676" stroke-width="0.7"/>

  <!-- Radar sweep -->
  <g class="radar-sweep" clip-path="url(#rc)">
    <path d="M310,210 L310,90 A120,120 0 0,1 430,210 Z" fill="url(#radarGrad)" opacity="0.55"/>
  </g>

  <!-- Radar blips (threat nodes) -->
  <circle cx="360" cy="160" r="4" fill="#00E676" filter="url(#glow)" opacity="0.9">
    <animate attributeName="opacity" values="0;1;0" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;5;2" dur="2s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="268" cy="228" r="3" fill="#FF5252" filter="url(#glow)" opacity="0.9">
    <animate attributeName="opacity" values="0;1;0" dur="2.8s" begin="1.2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;4;2" dur="2.8s" begin="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="340" cy="280" r="3.5" fill="#FFAB40" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" values="0;0.9;0" dur="3.2s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;4.5;2" dur="3.2s" begin="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="380" cy="240" r="3" fill="#00E5FF" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" values="0;0.8;0" dur="2.5s" begin="3s" repeatCount="indefinite"/>
  </circle>

  <!-- ── DATA STREAM LINES ── -->
  <g opacity="0.3" filter="url(#glow)">
    <path d="M0,68 Q120,60 200,90 T380,80 T560,72" fill="none" stroke="#00E676" stroke-width="0.8" stroke-dasharray="6 8">
      <animate attributeName="stroke-dashoffset" from="0" to="-280" dur="4s" repeatCount="indefinite"/>
    </path>
    <path d="M620,110 Q500,100 400,125 T200,115 T40,108" fill="none" stroke="#00E676" stroke-width="0.6" stroke-dasharray="4 10">
      <animate attributeName="stroke-dashoffset" from="0" to="280" dur="5s" repeatCount="indefinite"/>
    </path>
    <path d="M0,140 Q80,130 150,155 T310,145 T470,138 T620,145" fill="none" stroke="#00BCD4" stroke-width="0.5" stroke-dasharray="3 12">
      <animate attributeName="stroke-dashoffset" from="0" to="-300" dur="6s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- ── FLOATING PARTICLES ── -->
  <g opacity="0.5">
    <circle cx="60" cy="300" r="1.5" fill="#00E676"><animate attributeName="cy" from="350" to="30" dur="7s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.6;0" dur="7s" repeatCount="indefinite"/></circle>
    <circle cx="100" cy="250" r="1" fill="#00E676"><animate attributeName="cy" from="370" to="10" dur="9s" begin="2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.5;0" dur="9s" begin="2s" repeatCount="indefinite"/></circle>
    <circle cx="175" cy="200" r="1.5" fill="#00BCD4"><animate attributeName="cy" from="360" to="20" dur="6s" begin="1s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.7;0" dur="6s" begin="1s" repeatCount="indefinite"/></circle>
    <circle cx="490" cy="280" r="1" fill="#00E676"><animate attributeName="cy" from="380" to="40" dur="8s" begin="0.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.6;0" dur="8s" begin="0.5s" repeatCount="indefinite"/></circle>
    <circle cx="550" cy="180" r="1.5" fill="#69F0AE"><animate attributeName="cy" from="360" to="0" dur="10s" begin="3s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.5;0" dur="10s" begin="3s" repeatCount="indefinite"/></circle>
    <circle cx="420" cy="320" r="1" fill="#00E676"><animate attributeName="cy" from="380" to="20" dur="7.5s" begin="4s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.6;0" dur="7.5s" begin="4s" repeatCount="indefinite"/></circle>
    <circle cx="130" cy="340" r="1" fill="#69F0AE"><animate attributeName="cy" from="370" to="10" dur="11s" begin="1.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.5;0" dur="11s" begin="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="580" cy="290" r="1.5" fill="#00BCD4"><animate attributeName="cy" from="360" to="0" dur="8.5s" begin="2.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.7;0" dur="8.5s" begin="2.5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- ── SHIELD (center) ── -->
  <g class="shield-g" filter="url(#strongglow)">
    <!-- Shield shape -->
    <path d="M310,170 L338,182 L338,214 Q338,236 310,248 Q282,236 282,214 L282,182 Z"
      fill="url(#shieldFill)" stroke="#00E676" stroke-width="1.8" stroke-linejoin="round"/>
    <!-- Check mark -->
    <path d="M299,210 L307,219 L322,200" fill="none" stroke="#00E676" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ── HUD TEXT ELEMENTS ── -->
  <!-- Top left status -->
  <text x="22" y="56" font-family="'Courier New', monospace" font-size="9" fill="#00E676" opacity="0.7" letter-spacing="1">SYS://PHISHX.AI</text>
  <text x="22" y="70" font-family="'Courier New', monospace" font-size="8" fill="#00E676" opacity="0.5" letter-spacing="1">STATUS: ACTIVE</text>

  <!-- Top right counter -->
  <text x="540" y="56" font-family="'Courier New', monospace" font-size="9" fill="#00E676" opacity="0.7" letter-spacing="1">THREATS BLOCKED</text>
  <text x="594" y="70" font-family="'Courier New', monospace" font-size="10" fill="#00E676" opacity="0.9" text-anchor="end" font-weight="bold">
    1,847,293
    <animate attributeName="textContent" values="1,847,293;1,847,294;1,847,296;1,847,297;1,847,299;1,847,300" dur="8s" repeatCount="indefinite" calcMode="discrete"/>
  </text>

  <!-- Bottom left micro-text -->
  <text x="22" y="356" font-family="'Courier New', monospace" font-size="7.5" fill="#00E676" opacity="0.45" letter-spacing="0.8">ML ENGINE v3.2 · LEXICAL ANALYSIS · 0ms LATENCY</text>

  <!-- Bottom right -->
  <text x="598" y="356" font-family="'Courier New', monospace" font-size="7.5" fill="#00E676" opacity="0.45" text-anchor="end" letter-spacing="0.8">ZERO-DAY DETECTION · FASTAPI BACKEND</text>

  <!-- Radar label -->
  <text x="310" y="344" font-family="'Courier New', monospace" font-size="8" fill="#00E676" opacity="0.5" text-anchor="middle" letter-spacing="1">THREAT RADAR · RANGE 120km</text>

  <!-- ── VIGNETTE ── -->
  <rect x="0" y="0" width="620" height="380" fill="url(#vig)" rx="12"/>
</svg>
