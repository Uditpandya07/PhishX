name: PhishX CI Pipeline

on:
  pull_request:
    branches: [ "main", "develop" ]
  push:
    branches: [ "main" ]

jobs:
  backend-tests:
    name: Backend PyTest & Quality
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: phishx_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
          
      - name: Install Dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run PyTest
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/phishx_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test_secret_key
        run: |
          pytest -v --cov=app --cov-report=xml
          
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  frontend-tests:
    name: Frontend Jest & Quality
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './phishx-frontend/package-lock.json'
          
      - name: Install Dependencies
        working-directory: ./phishx-frontend
        run: npm ci
        
      - name: Run Linter
        working-directory: ./phishx-frontend
        run: npm run lint || true
        
      - name: Run Tests
        working-directory: ./phishx-frontend
        run: npm run test

  security-scan:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
      
    steps:
      - uses: actions/checkout@v4
      
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python, javascript
          
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          upload: true

  build-frontend:
    name: Build Frontend (Next.js)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './phishx-frontend/package-lock.json'

      - name: Install Dependencies
        working-directory: ./phishx-frontend
        run: npm ci

      - name: Build Next.js App
        working-directory: ./phishx-frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build
